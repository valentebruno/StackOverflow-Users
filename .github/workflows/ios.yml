name: iOS

on:
  push:
    branches: [main, feature, bugfix]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest

    env:
      PROJECT: StackOverflowUsers.xcodeproj
      SCHEME: StackOverflowUsers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve simulator destination
        id: simulator
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes --json \
            | python3 -c 'import json,sys; runtimes=[r for r in json.load(sys.stdin)["runtimes"] if r["isAvailable"] and r["platform"]=="iOS"]; runtimes.sort(key=lambda r: r["version"]); print(runtimes[-1]["identifier"])')
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; data=json.load(sys.stdin); devs=data['devices'].get('$RUNTIME_ID',[]); iphones=[d for d in devs if d['name'].startswith('iPhone') and d['isAvailable']]; iphones.sort(key=lambda d: d['name']); print(iphones[-1]['udid'] if iphones else '')")
          if [ -z "$DEVICE_ID" ]; then
            echo "No iPhone simulator available for runtime $RUNTIME_ID" >&2
            exit 1
          fi
          echo "Selected device $DEVICE_ID on runtime $RUNTIME_ID"
          echo "destination=platform=iOS Simulator,id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: List project
        run: xcodebuild -project "$PROJECT" -list

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
