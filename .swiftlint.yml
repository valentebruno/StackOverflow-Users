included:
  - StackOverflowUsers
  - StackOverflowUsersTests
  - StackOverflowUsersUITests

excluded:
  - StackOverflowUsers.xcodeproj

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - toggle_bool

disabled_rules:
  - trailing_whitespace
  - force_unwrapping
  - sorted_imports
  - non_optional_string_data_conversion
  - void_function_in_ternary
  - xctfail_message

line_length:
  warning: 120
  error: 150

file_length:
  warning: 600
  error: 800

type_body_length:
  warning: 300
  error: 500

identifier_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - vm

reporter: "xcode"
